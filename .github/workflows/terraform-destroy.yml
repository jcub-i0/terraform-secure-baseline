name: Terraform Destroy

on:
    workflow_dispatch:
        inputs:
            confirm:
                description: "Type DESTROY to destroy infrastructure"
                required: true

permissions:
    id-token: write
    contents: read

concurrency:
    group: terraform-destroy-dev
    cancel-in-progress: false

jobs:
    terraform-destroy:
        runs-on: ubuntu-latest
        environment: dev

        steps:
            - name: Confirm destroy
              run: |
                if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
                    echo "Confirmation failed. Aborting."
                    exit 1
                fi

            - name: Checkout
              uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: arn:aws:iam::072288671186:role/tf-secure-baseline-dev-github-apply-role
                aws-region: us-east-1

            - name: Verify identity
              run: aws sts get-caller-identity

            - name: Verify S3 access
              run: aws s3 ls s3://baseline-tf-state/baseline-tf-state/tf-state

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Terraform Init
              run: terraform init

            - name: Terraform Destroy
              run: |
                set -o pipefail
                
                for attempt in 1 2 3; do
                    echo "========== Terraform destroy attempt $attempt =========="

                    terraform destroy -auto-approve -input=false -no-color 2>&1 | tee destroy.log
                    status=$?

                    if [ $status -eq 0 ]; then
                        echo "Terraform destroy succeeded on attempt $attempt"
                        exit 0
                    fi

                    if grep -Eq "Permission set provision not found|Assignment not found" destroy.log; then
                        if [ $attempt -lt 3 ]; then
                            echo "Hit IAM Identity Center eventual consistency issue. Retrying on attempt $attempt."
                            echo "Sleeping for 60 seconds before retry..."
                            sleep 60
                        else
                            echo "Retries exhausted after attempt $attempt"
                            exit $status
                        fi
                    else
                        echo "Non-retryable terraform error on attempt $attempt"
                        exit $status
                    fi
                done