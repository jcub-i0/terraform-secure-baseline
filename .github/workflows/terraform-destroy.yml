name: Terraform Destroy

on:
    workflow_dispatch:
        inputs:
            confirm:
                description: "Type DESTROY to destroy infrastructure"
                required: true

permissions:
    id-token: write
    contents: read

jobs:
    terraform-destroy:
        runs-on: ubuntu-latest
        environment: dev

        steps:
            - name: Confirm destroy
              run: |
                if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
                    echo "Confirmation failed. Aborting."
                    exit 1
                fi

            - name: Checkout
              uses: actions/checkout@4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: arn:aws:iam::072288671186:role/tf-secure-baseline-dev-github-apply-role
                aws-region: us-east-1

            - name: Verify identity
              run: aws sts get-caller-identity

            - name: Verify S3 access
              run: aws s3 ls s3://baseline-tf-state/baseline-tf-state/tf-state

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Terraform Init
              run: terraform init

            - name: Terraform Destroy
              run: terraform destroy -auto-approve -input=false