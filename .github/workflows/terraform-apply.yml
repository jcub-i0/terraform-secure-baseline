name: Terraform Apply

on:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            confirm:
                description: "Type 'YES' to apply"
                required: true

permissions:
    id-token: write
    contents: read

concurrency:
    group: terraform-apply-dev
    cancel-in-progress: false

jobs:
    terraform-apply:
        runs-on: ubuntu-latest
        environment: dev

        env:
            TF_VAR_abuseipdb_api_key: ${{secrets.ABUSEIPDB_API_KEY}}
            TF_VAR_bucket_admin_principals: ${{vars.BUCKET_ADMIN_PRINCIPALS}}
            TF_VAR_tf_state_bucket_arn: ${{vars.TF_STATE_BUCKET_ARN}}
            TF_VAR_tf_state_lock_table_arn: ${{vars.TF_STATE_LOCK_TABLE_ARN}}
            TF_VAR_allow_pull_requests_plan_github: ${{vars.ALLOW_PULL_REQUESTS_PLAN_GITHUB}}
            TF_VAR_break_glass_trusted_principal_arns: ${{vars.BREAK_GLASS_TRUSTED_PRINCIPAL_ARNS}}
            TF_VAR_secops_emails: ${{vars.SECOPS_EMAILS}}

        steps:
            - name: Checkout
              uses: actions/checkout@v4
            
            - name: Configure AWS credentials from GitHub OIDC
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: arn:aws:iam::072288671186:role/tf-secure-baseline-dev-github-apply-role
                aws-region: us-east-1

            - name: Verify identity
              run: aws sts get-caller-identity

            - name: Verify S3 access
              run: aws s3 ls s3://tf-secure-baseline-state/tf-state-baseline

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Terraform Init
              working-directory: ./baseline
              run: terraform init

            - name: Terraform Validate
              working-directory: ./baseline
              run: terraform validate

            - name: Terraform Apply
              working-directory: ./baseline
              shell: bash
              run: |
                set -o pipefail
                
                for attempt in 1 2 3; do
                    echo "========== Terraform apply attempt $attempt =========="

                    terraform apply -auto-approve -input=false -no-color 2>&1 | tee apply.log
                    status=$?

                    if [ $status -eq 0 ]; then
                        echo "Terraform apply succeeded on attempt $attempt"
                        exit 0
                    fi

                    if grep -Eq "Permission set provision not found|Assignment not found" apply.log; then
                        if [ $attempt -lt 3 ]; then
                            echo "Hit IAM Identity Center eventual consistency issue. Retrying on attempt $attempt."
                            echo "Sleeping for 60 seconds before retry..."
                            sleep 60
                        else
                            echo "Retries exhausted after attempt $attempt"
                            exit $status
                        fi
                    else
                        echo "Non-retryable terraform error on attempt $attempt"
                        exit $status
                    fi
                done