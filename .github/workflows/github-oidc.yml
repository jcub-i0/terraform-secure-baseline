name: Terraform Plan

on:
    pull_request:
    push:
        branches:
            - main
permissions:
    id-token: write
    contents: read

jobs:
  terraform-plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::072288671186:role/tf-secure-baseline-dev-github-plan-role
          aws-region: us-east-1

      - name: Verify identity
        run: aws sts get-caller-identity

      - name: Verify S3 access
        run: aws s3 ls s3://baseline-tf-state/baseline-tf-state/tf-state

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color
        env:
          TF_VAR_abuseipdb_api_key: ${{secrets.TF_VAR_ABUSEIPDB_API_KEY}}
          TF_VAR_bucket_admin_principals: ${{vars.TF_VAR_BUCKET_ADMIN_PRINCIPALS}}
          #comment