############################################
## GIT WORKFLOW FOR DOCUMENTATION QUALITY ##
############################################

name: Docs Validation

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".markdownlint.json"
      - ".github/workflows/docs-validation.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint.json"
      - ".github/workflows/docs-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs_validation:
    name: Validate Markdown docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md
            !**/.terraform/**
            !**/node_modules/**

      - name: Check Links in Markdown
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --format detailed
            --accept 200,206,301,302,303,307,308,429
            --retry-wait-time 5
            --max-retries 3
            --timeout 20
            --exclude-mail
            --include-fragments
            './**/*.md'
          fail: true

      - name: Check for Trailing Whitespace in Markdown
        run: |
          set -euo pipefail
          if grep -RIn --include='*.md' -E '[[:blank:]]+$' .; then
            echo "Trailing whitespace detected in Markdown files."
            exit 1
          fi