name: Reconcile Workload Account

run-name: Workload account reconciliation - ${{ inputs.environment }} - ${{ inputs.operation }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Workload environment to reconcile"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod
      operation:
        description: "Choose whether to stop after planning or apply after approval"
        required: true
        default: "plan-only"
        type: choice
        options:
          - plan-only
          - plan-and-apply
  workflow_call:
    inputs:
      environment:
        description: "Workload environment to reconcile"
        required: true
        type: string
      operation:
        description: "Reconciliation operation: plan or apply"
        required: false
        default: "plan-only"
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: reconcile-workload-account-${{ inputs.environment }}
  cancel-in-progress: false

env:
  AWS_PAGER: ""
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TERRAFORM_VERSION: "1.15.8"
  PLAN_ARTIFACT_NAME: workload-account-reconciliation-plan-${{ inputs.environment }}-${{ github.run_id }}-${{ github.run_attempt }}
  PLAN_ARTIFACT_DIR: reconciliation-plan-artifact
  PLAN_FILE_NAME: account-reconciliation.tfplan
  PLAN_TEXT_FILE_NAME: account-reconciliation-plan.txt
  PLAN_LOG_FILE_NAME: account-reconciliation-plan.log
  PLAN_METADATA_FILE_NAME: account-reconciliation-plan-metadata.json

jobs:
  validate-request:
    name: Validate reconciliation request
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate workflow inputs
        shell: bash
        env:
          TARGET_ENVIRONMENT: ${{ inputs.environment }}
          OPERATION: ${{ inputs.operation }}
        run: |
          set -euo pipefail

          case "${TARGET_ENVIRONMENT}" in
            dev|staging|prod)
              ;;
            *)
              echo "::error::Unsupported environment: ${TARGET_ENVIRONMENT}"
              exit 1
              ;;
          esac

          case "${OPERATION}" in
            plan-only|plan-and-apply)
              ;;
            *)
              echo "::error::Unsupported operation: ${OPERATION}. Expected plan-only or plan-and-apply."
              exit 1
              ;;
          esac

  reconcile-plan:
    name: Plan ${{ inputs.environment }} account reconciliation
    needs: validate-request
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ format('{0}-plan', inputs.environment) }}

    env:
      CLOUD_NAME: ${{ vars.CLOUD_NAME }}
      TF_VAR_cloud_name: ${{ vars.CLOUD_NAME }}
      TF_VAR_environment: ${{ inputs.environment }}
      TF_VAR_primary_region: ${{ vars.PRIMARY_REGION }}
      TF_VAR_enable_github_oidc: "true"
      TF_VAR_owner_github: ${{ github.repository_owner }}
      TF_VAR_repo_github: ${{ github.event.repository.name }}
      TF_VAR_branches_plan_github: ${{ vars.BRANCHES_PLAN_GITHUB || '["main"]' }}
      TF_VAR_allow_pull_requests_plan_github: ${{ vars.ALLOW_PULL_REQUESTS_PLAN_GITHUB || 'false' }}
      TF_VAR_tf_state_bucket_arn: ${{ vars.TF_STATE_BUCKET_ARN }}
      TF_VAR_tf_state_bucket_cmk_arn: ${{ vars.TF_STATE_BUCKET_CMK_ARN }}
      TF_VAR_enable_apply_role_github: "true"
      TF_VAR_branches_apply_github: ${{ vars.BRANCHES_APPLY_GITHUB || '["main"]' }}
      TF_VAR_environment_apply_github: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve and validate workflow settings
        shell: bash
        env:
          TARGET_ENVIRONMENT: ${{ inputs.environment }}
          PRIMARY_REGION: ${{ vars.PRIMARY_REGION }}
          PLAN_ROLE_GITHUB_ARN: ${{ vars.PLAN_ROLE_GITHUB_ARN }}
          TF_STATE_BUCKET_ARN: ${{ vars.TF_STATE_BUCKET_ARN }}
          TF_STATE_BUCKET_CMK_ARN: ${{ vars.TF_STATE_BUCKET_CMK_ARN }}
          ACCOUNT_ID: ${{ vars.ACCOUNT_ID }}
        run: |
          set -euo pipefail

          required_settings=(
            CLOUD_NAME
            PRIMARY_REGION
            ACCOUNT_ID
            PLAN_ROLE_GITHUB_ARN
            TF_STATE_BUCKET_ARN
            TF_STATE_BUCKET_CMK_ARN
          )

          for setting_name in "${required_settings[@]}"; do
            if [[ -z "${!setting_name:-}" ]]; then
              echo "::error::${setting_name} is not configured in the selected GitHub Environment."
              exit 1
            fi
          done

          EXPECTED_ACCOUNT_ID="${ACCOUNT_ID}"

          if [[ ! "${EXPECTED_ACCOUNT_ID}" =~ ^[0-9]{12}$ ]]; then
            echo "::error::ACCOUNT_ID for ${TARGET_ENVIRONMENT} must contain exactly 12 digits."
            exit 1
          fi

          if [[ ! "${PLAN_ROLE_GITHUB_ARN}" =~ ^arn:[^:]+:iam::([0-9]{12}):role/.+ ]]; then
            echo "::error::PLAN_ROLE_GITHUB_ARN is not a valid IAM role ARN."
            exit 1
          fi

          if [[ "${BASH_REMATCH[1]}" != "${EXPECTED_ACCOUNT_ID}" ]]; then
            echo "::error::PLAN_ROLE_GITHUB_ARN belongs to account ${BASH_REMATCH[1]}, expected ${EXPECTED_ACCOUNT_ID}."
            exit 1
          fi

          if ! jq -e 'type == "array" and all(.[]; type == "string" and length > 0)' \
            <<< "${TF_VAR_branches_plan_github}" >/dev/null; then
            echo "::error::BRANCHES_PLAN_GITHUB must be a JSON array of non-empty strings."
            exit 1
          fi

          if ! jq -e 'type == "array" and all(.[]; type == "string" and length > 0)' \
            <<< "${TF_VAR_branches_apply_github}" >/dev/null; then
            echo "::error::BRANCHES_APPLY_GITHUB must be a JSON array of non-empty strings."
            exit 1
          fi

          case "${TF_VAR_allow_pull_requests_plan_github}" in
            true|false)
              ;;
            *)
              echo "::error::ALLOW_PULL_REQUESTS_PLAN_GITHUB must be true or false."
              exit 1
              ;;
          esac

          {
            echo "AWS_REGION=${PRIMARY_REGION}"
            echo "AWS_DEFAULT_REGION=${PRIMARY_REGION}"
            echo "EXPECTED_ACCOUNT_ID=${EXPECTED_ACCOUNT_ID}"
          } >> "${GITHUB_ENV}"

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.PLAN_ROLE_GITHUB_ARN }}
          aws-region: ${{ vars.PRIMARY_REGION }}

      - name: Verify AWS identity
        shell: bash
        run: |
          set -euo pipefail

          ACTIVE_ACCOUNT_ID="$(
            aws sts get-caller-identity \
              --query Account \
              --output text
          )"

          if [[ "${ACTIVE_ACCOUNT_ID}" != "${EXPECTED_ACCOUNT_ID}" ]]; then
            echo "::error::AWS account mismatch. Expected ${EXPECTED_ACCOUNT_ID}, got ${ACTIVE_ACCOUNT_ID}."
            exit 1
          fi

          aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Generate saved workload account reconciliation plan
        shell: bash
        env:
          TARGET_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -euo pipefail

          PLAN_ARTIFACT_PATH="${GITHUB_WORKSPACE}/${PLAN_ARTIFACT_DIR}"
          PLAN_FILE="${PLAN_ARTIFACT_PATH}/${PLAN_FILE_NAME}"
          PLAN_TEXT_FILE="${PLAN_ARTIFACT_PATH}/${PLAN_TEXT_FILE_NAME}"
          PLAN_LOG_FILE="${PLAN_ARTIFACT_PATH}/${PLAN_LOG_FILE_NAME}"
          PLAN_METADATA_FILE="${PLAN_ARTIFACT_PATH}/${PLAN_METADATA_FILE_NAME}"
          ACCOUNT_DIRECTORY="bootstrap/${TARGET_ENVIRONMENT}/account"

          mkdir -p "${PLAN_ARTIFACT_PATH}"

          ./scripts/bootstrap/reconcile-workload-account.sh \
            "${TARGET_ENVIRONMENT}" \
            --plan-file="${PLAN_FILE}" \
            2>&1 | tee "${PLAN_LOG_FILE}"

          terraform -chdir="${ACCOUNT_DIRECTORY}" show \
            -no-color \
            "${PLAN_FILE}" > "${PLAN_TEXT_FILE}"

          TERRAFORM_CLI_VERSION="$(
            terraform version -json |
              jq -r '.terraform_version'
          )"

          jq -n \
            --arg environment "${TARGET_ENVIRONMENT}" \
            --arg commit_sha "${GITHUB_SHA}" \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg workflow_run_id "${GITHUB_RUN_ID}" \
            --arg workflow_run_attempt "${GITHUB_RUN_ATTEMPT}" \
            --arg terraform_version "${TERRAFORM_CLI_VERSION}" \
            '{
              environment: $environment,
              commit_sha: $commit_sha,
              repository: $repository,
              workflow_run_id: $workflow_run_id,
              workflow_run_attempt: $workflow_run_attempt,
              terraform_version: $terraform_version
            }' > "${PLAN_METADATA_FILE}"

          (
            cd "${PLAN_ARTIFACT_PATH}"
            sha256sum "${PLAN_FILE_NAME}" > "${PLAN_FILE_NAME}.sha256"
          )

      - name: Publish reconciliation plan summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          PLAN_ARTIFACT_PATH="${GITHUB_WORKSPACE}/${PLAN_ARTIFACT_DIR}"
          PLAN_TEXT_FILE="${PLAN_ARTIFACT_PATH}/${PLAN_TEXT_FILE_NAME}"
          PLAN_LOG_FILE="${PLAN_ARTIFACT_PATH}/${PLAN_LOG_FILE_NAME}"

          {
            echo "# Workload Account Reconciliation Plan"
            echo
            echo "- Environment: \`${{ inputs.environment }}\`"
            echo "- Requested operation: \`${{ inputs.operation }}\`"
            echo "- GitHub Environment: \`${{ format('{0}-plan', inputs.environment) }}\`"
            echo "- AWS Region: \`${AWS_REGION:-<not resolved>}\`"
            echo "- Expected AWS Account ID: \`${EXPECTED_ACCOUNT_ID:-<not resolved>}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Plan job status: \`${{ job.status }}\`"
            echo
            echo "When apply was requested, the protected apply job will use this exact saved plan."
            echo
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ -f "${PLAN_TEXT_FILE}" ]]; then
            {
              echo "<details>"
              echo "<summary>View reconciliation plan</summary>"
              echo
              echo '```text'
              cat "${PLAN_TEXT_FILE}"
              echo '```'
              echo
              echo "</details>"
            } >> "${GITHUB_STEP_SUMMARY}"
          elif [[ -f "${PLAN_LOG_FILE}" ]]; then
            {
              echo "## Reconciliation Log"
              echo
              echo '```text'
              tail -n 200 "${PLAN_LOG_FILE}"
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload saved reconciliation plan
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PLAN_ARTIFACT_NAME }}
          path: ${{ github.workspace }}/${{ env.PLAN_ARTIFACT_DIR }}
          if-no-files-found: error
          retention-days: 1

      - name: Upload failed reconciliation log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: workload-account-reconciliation-plan-failure-${{ inputs.environment }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/${{ env.PLAN_ARTIFACT_DIR }}/${{ env.PLAN_LOG_FILE_NAME }}
          if-no-files-found: warn
          retention-days: 30

  reconcile-apply:
    name: Apply reviewed ${{ inputs.environment }} account reconciliation
    if: inputs.operation == 'plan-and-apply'
    needs: reconcile-plan
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment: ${{ inputs.environment }}

    env:
      CLOUD_NAME: ${{ vars.CLOUD_NAME }}
      TF_VAR_cloud_name: ${{ vars.CLOUD_NAME }}
      TF_VAR_environment: ${{ inputs.environment }}
      TF_VAR_primary_region: ${{ vars.PRIMARY_REGION }}
      TF_VAR_enable_github_oidc: "true"
      TF_VAR_owner_github: ${{ github.repository_owner }}
      TF_VAR_repo_github: ${{ github.event.repository.name }}
      TF_VAR_branches_plan_github: ${{ vars.BRANCHES_PLAN_GITHUB || '["main"]' }}
      TF_VAR_allow_pull_requests_plan_github: ${{ vars.ALLOW_PULL_REQUESTS_PLAN_GITHUB || 'false' }}
      TF_VAR_tf_state_bucket_arn: ${{ vars.TF_STATE_BUCKET_ARN }}
      TF_VAR_tf_state_bucket_cmk_arn: ${{ vars.TF_STATE_BUCKET_CMK_ARN }}
      TF_VAR_enable_apply_role_github: "true"
      TF_VAR_branches_apply_github: ${{ vars.BRANCHES_APPLY_GITHUB || '["main"]' }}
      TF_VAR_environment_apply_github: ${{ inputs.environment }}
      RECONCILIATION_LOG: reconciliation-${{ inputs.environment }}-apply.log

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve and validate workflow settings
        shell: bash
        env:
          TARGET_ENVIRONMENT: ${{ inputs.environment }}
          PRIMARY_REGION: ${{ vars.PRIMARY_REGION }}
          APPLY_ROLE_GITHUB_ARN: ${{ vars.APPLY_ROLE_GITHUB_ARN }}
          TF_STATE_BUCKET_ARN: ${{ vars.TF_STATE_BUCKET_ARN }}
          TF_STATE_BUCKET_CMK_ARN: ${{ vars.TF_STATE_BUCKET_CMK_ARN }}
          ACCOUNT_ID: ${{ vars.ACCOUNT_ID }}
          STATE_STACK_BACKEND_KEY: ${{ vars.STATE_STACK_BACKEND_KEY }}
        run: |
          set -euo pipefail

          required_settings=(
            CLOUD_NAME
            PRIMARY_REGION
            ACCOUNT_ID
            APPLY_ROLE_GITHUB_ARN
            TF_STATE_BUCKET_ARN
            TF_STATE_BUCKET_CMK_ARN
            STATE_STACK_BACKEND_KEY
          )

          for setting_name in "${required_settings[@]}"; do
            if [[ -z "${!setting_name:-}" ]]; then
              echo "::error::${setting_name} is not configured in the selected GitHub Environment."
              exit 1
            fi
          done

          EXPECTED_ACCOUNT_ID="${ACCOUNT_ID}"

          if [[ ! "${EXPECTED_ACCOUNT_ID}" =~ ^[0-9]{12}$ ]]; then
            echo "::error::ACCOUNT_ID for ${TARGET_ENVIRONMENT} must contain exactly 12 digits."
            exit 1
          fi

          if [[ ! "${APPLY_ROLE_GITHUB_ARN}" =~ ^arn:[^:]+:iam::([0-9]{12}):role/.+ ]]; then
            echo "::error::APPLY_ROLE_GITHUB_ARN is not a valid IAM role ARN."
            exit 1
          fi

          if [[ "${BASH_REMATCH[1]}" != "${EXPECTED_ACCOUNT_ID}" ]]; then
            echo "::error::APPLY_ROLE_GITHUB_ARN belongs to account ${BASH_REMATCH[1]}, expected ${EXPECTED_ACCOUNT_ID}."
            exit 1
          fi

          {
            echo "AWS_REGION=${PRIMARY_REGION}"
            echo "AWS_DEFAULT_REGION=${PRIMARY_REGION}"
            echo "EXPECTED_ACCOUNT_ID=${EXPECTED_ACCOUNT_ID}"
          } >> "${GITHUB_ENV}"

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.APPLY_ROLE_GITHUB_ARN }}
          aws-region: ${{ vars.PRIMARY_REGION }}

      - name: Verify AWS identity
        shell: bash
        run: |
          set -euo pipefail

          ACTIVE_ACCOUNT_ID="$(
            aws sts get-caller-identity \
              --query Account \
              --output text
          )"

          if [[ "${ACTIVE_ACCOUNT_ID}" != "${EXPECTED_ACCOUNT_ID}" ]]; then
            echo "::error::AWS account mismatch. Expected ${EXPECTED_ACCOUNT_ID}, got ${ACTIVE_ACCOUNT_ID}."
            exit 1
          fi

          aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Download reviewed reconciliation plan
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.PLAN_ARTIFACT_NAME }}
          path: ${{ github.workspace }}/${{ env.PLAN_ARTIFACT_DIR }}

      - name: Verify saved reconciliation plan
        shell: bash
        run: |
          set -euo pipefail

          PLAN_ARTIFACT_PATH="${GITHUB_WORKSPACE}/${PLAN_ARTIFACT_DIR}"
          PLAN_METADATA_FILE="${PLAN_ARTIFACT_PATH}/${PLAN_METADATA_FILE_NAME}"

          test -s "${PLAN_ARTIFACT_PATH}/${PLAN_FILE_NAME}"
          test -s "${PLAN_ARTIFACT_PATH}/${PLAN_FILE_NAME}.sha256"
          test -s "${PLAN_METADATA_FILE}"

          (
            cd "${PLAN_ARTIFACT_PATH}"
            sha256sum --check "${PLAN_FILE_NAME}.sha256"
          )

          jq -e \
            --arg environment "${{ inputs.environment }}" \
            --arg commit_sha "${GITHUB_SHA}" \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg workflow_run_id "${GITHUB_RUN_ID}" \
            --arg workflow_run_attempt "${GITHUB_RUN_ATTEMPT}" \
            --arg terraform_version "${TERRAFORM_VERSION}" \
            '
              .environment == $environment and
              .commit_sha == $commit_sha and
              .repository == $repository and
              .workflow_run_id == $workflow_run_id and
              .workflow_run_attempt == $workflow_run_attempt and
              .terraform_version == $terraform_version
            ' \
            "${PLAN_METADATA_FILE}" >/dev/null

          echo "Saved reconciliation plan metadata and checksum are valid."

      - name: Materialize state-stack backend
        shell: bash
        env:
          TARGET_ENVIRONMENT: ${{ inputs.environment }}
          STATE_BUCKET_ARN: ${{ vars.TF_STATE_BUCKET_ARN }}
          STATE_CMK_ARN: ${{ vars.TF_STATE_BUCKET_CMK_ARN }}
          STATE_BACKEND_KEY: ${{ vars.STATE_STACK_BACKEND_KEY }}
          AWS_REGION: ${{ vars.PRIMARY_REGION }}
        run: |
          set -euo pipefail

          STATE_DIR="bootstrap/${TARGET_ENVIRONMENT}/state"
          BACKEND_FILE="${STATE_DIR}/backend.tf"
          STATE_BUCKET="${STATE_BUCKET_ARN#arn:aws:s3:::}"

          [[ -n "${STATE_BUCKET}" ]] ||
            { echo "::error::Unable to resolve state bucket name"; exit 1; }

          [[ -n "${STATE_BACKEND_KEY}" ]] ||
            { echo "::error::STATE_STACK_BACKEND_KEY is required"; exit 1; }

          cat > "${BACKEND_FILE}" <<EOF
          terraform {
            backend "s3" {
              bucket       = "${STATE_BUCKET}"
              key          = "${STATE_BACKEND_KEY}"
              region       = "${AWS_REGION}"
              encrypt      = true
              kms_key_id   = "${STATE_CMK_ARN}"
              use_lockfile = true
            }
          }
          EOF

          terraform -chdir="${STATE_DIR}" init \
            -input=false \
            -no-color

      - name: Apply reviewed workload account reconciliation plan
        shell: bash
        env:
          TARGET_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -euo pipefail

          PLAN_FILE="${GITHUB_WORKSPACE}/${PLAN_ARTIFACT_DIR}/${PLAN_FILE_NAME}"

          ./scripts/bootstrap/reconcile-workload-account.sh \
            "${TARGET_ENVIRONMENT}" \
            --apply-plan="${PLAN_FILE}" \
            --auto-approve \
            2>&1 | tee "${RECONCILIATION_LOG}"

      - name: Publish reconciliation apply summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "# Workload Account Reconciliation Apply"
            echo
            echo "- Environment: \`${{ inputs.environment }}\`"
            echo "- GitHub Environment: \`${{ inputs.environment }}\`"
            echo "- AWS Region: \`${AWS_REGION:-<not resolved>}\`"
            echo "- Expected AWS Account ID: \`${EXPECTED_ACCOUNT_ID:-<not resolved>}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Saved plan artifact: \`${PLAN_ARTIFACT_NAME}\`"
            echo "- Strict post-apply validation: \`enabled\`"
            echo "- Apply job status: \`${{ job.status }}\`"
            echo
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ -f "${RECONCILIATION_LOG}" ]]; then
            {
              echo "## Reconciliation Apply Log"
              echo
              echo '```text'
              tail -n 200 "${RECONCILIATION_LOG}"
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload reconciliation apply log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: workload-account-reconciliation-${{ inputs.environment }}-apply-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.RECONCILIATION_LOG }}
          if-no-files-found: warn
          retention-days: 30